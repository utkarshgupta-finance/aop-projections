<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MRR Commit Dashboard</title>
<style>
  .viz-root {
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --good:           #0ca30c;
    --warning:        #fab219;
    --series-1: #2a78d6; /* KAM BU */
    --series-2: #1baf7a; /* MEA BU */
    --series-3: #eda100; /* SEA BU */
    --series-4: #008300; /* BAT BU */
    --series-5: #4a3aa7; /* India MM BU */
    --series-6: #e34948; /* India ENT BU */
    --series-7: #e87ba4; /* SME BU */
    --series-8: #eb6834; /* fallback / new BU */
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --good:           #0ca30c;
      --warning:        #fab219;
      --series-1: #3987e5;
      --series-2: #199e70;
      --series-3: #c98500;
      --series-4: #008300;
      --series-5: #9085e9;
      --series-6: #e66767;
      --series-7: #d55181;
      --series-8: #d95926;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color: inherit; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 32px 20px 64px; }
  .topbar { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { color: var(--text-secondary); font-size: 13px; margin: 0 0 20px; }
  .settings-link { font-size: 12px; color: var(--text-secondary); text-decoration: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; }
  .settings-link:hover { color: var(--text-primary); }
  .tab-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .tab-group-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; color: var(--text-muted); width: 90px; flex-shrink: 0; }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab-btn {
    appearance: none; border: 1px solid transparent; background: none; cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 600; color: var(--text-secondary);
    padding: 6px 14px; border-radius: 999px;
  }
  .tab-btn:hover { color: var(--text-primary); border-color: var(--border); }
  .tab-btn.active { color: #fff; background: var(--series-1); }
  .tab-group.type .tab-btn.active { background: var(--series-5); }
  .tab-group.bu .tab-btn.active { background: var(--series-7); }
  .tab-divider { border-bottom: 1px solid var(--border); margin: 12px 0 20px; }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .card h2 { font-size: 14px; margin: 0; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
  .card h2 .hint { text-transform: none; font-weight: 400; letter-spacing: normal; color: var(--text-muted); }
  .view-toggle { display: flex; gap: 2px; background: var(--page); border: 1px solid var(--border); border-radius: 6px; padding: 2px; }
  .view-toggle button {
    appearance: none; border: none; background: none; cursor: pointer; font: inherit; font-size: 12px; font-weight: 600;
    color: var(--text-secondary); padding: 4px 10px; border-radius: 4px;
  }
  .view-toggle button.active { background: var(--surface-1); color: var(--text-primary); box-shadow: 0 1px 2px var(--border); }
  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .stat-tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat-value.warn { color: var(--warning); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 3px 8px; border-radius: 999px; background: rgba(250,178,25,0.15); color: #96650a; font-weight: 600; white-space: nowrap; }
  @media (prefers-color-scheme: dark) { .badge { color: var(--warning); } }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .bar-label { width: 130px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; display: flex; height: 22px; position: relative; }
  .bar-track::after { content: ''; position: absolute; left: 50%; top: -3px; bottom: -3px; width: 1px; background: var(--baseline); }
  .bar-half { width: 50%; position: relative; }
  .bar-fill { position: absolute; top: 0; height: 100%; border-radius: 3px; }
  .bar-fill.neg { right: 0; border-radius: 3px 0 0 3px; }
  .bar-fill.pos { left: 0; border-radius: 0 3px 3px 0; }
  .target-tick { position: absolute; top: -5px; bottom: -5px; width: 2px; background: var(--text-primary); }
  .target-tick::after {
    content: attr(data-label); position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: var(--text-muted); white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .bar-value { font-size: 12px; color: var(--text-primary); font-variant-numeric: tabular-nums; margin-left: 8px; white-space: nowrap; width: 110px; }
  .split-row { display: flex; height: 28px; border-radius: 6px; overflow: hidden; }
  .split-seg { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; }
  .legend { display: flex; gap: 18px; margin-top: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-swatch.tick { width: 2px; height: 12px; border-radius: 0; background: var(--text-primary) !important; }
  .table-controls { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .search-input {
    flex: 1; min-width: 220px; font: inherit; font-size: 13px; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 6px; background: var(--surface-1); color: var(--text-primary);
  }
  .filter-select { font: inherit; font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface-1); color: var(--text-primary); }
  .result-count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--gridline); white-space: nowrap; }
  th { color: var(--text-secondary); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.02em; position: sticky; top: 0; background: var(--surface-1); user-select: none; }
  th[data-sort] { cursor: pointer; }
  th[data-sort]:hover { color: var(--text-primary); }
  th .sort-arrow { color: var(--text-muted); margin-left: 3px; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.name-cell { white-space: normal; min-width: 220px; }
  .name-chain { color: var(--text-muted); }
  .name-chain .arrow { margin: 0 4px; }
  .muted { color: var(--text-muted); }
  .error { color: #d03b3b; font-size: 13px; }
  tr:hover td { background: rgba(11,11,11,0.03); }
  @media (prefers-color-scheme: dark) { tr:hover td { background: rgba(255,255,255,0.04); } }
  .zoho-link { text-decoration: none; border-bottom: 1px dotted var(--text-muted); }
  .zoho-link:hover { border-bottom-style: solid; }
  .ref-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .ref-table td, .ref-table th { padding: 6px 10px; }
</style>
</head>
<body>
<div class="viz-root">
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>MRR Commit Dashboard</h1>
        <p class="subtitle" id="subtitle">Loading latest snapshot...</p>
      </div>
      <a class="settings-link" href="settings.html">Settings</a>
    </div>
    <div class="tab-group metric"><span class="tab-group-label">Metric</span><div class="tabs" id="metric-tabs"></div></div>
    <div class="tab-group period"><span class="tab-group-label">Period</span><div class="tabs" id="period-tabs"></div></div>
    <div class="tab-group type"><span class="tab-group-label">Type</span><div class="tabs" id="type-tabs"></div></div>
    <div class="tab-group bu"><span class="tab-group-label">Business Unit</span><div class="tabs" id="bu-tabs"></div></div>
    <div class="tab-divider"></div>
    <div id="content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qnulyenilttpalbkmpvm.supabase.co';
const SUPABASE_KEY = 'sb_publishable__ZX4BeZvlMqaYi8MWrP2Kg_itCCcMFZ';
const ZOHO_DEAL_URL = id => `https://crm.zoho.com/crm/org60001177108/tab/Potentials/${id}`;

const BU_COLOR_VAR = { 'KAM BU': '--series-1', 'MEA BU': '--series-2', 'SEA BU': '--series-3', 'BAT BU': '--series-4', 'India MM BU': '--series-5', 'India ENT BU': '--series-6', 'SME BU': '--series-7' };
const METRIC_TABS = [
  { key: 'MRR', label: 'MRR' },
  { key: 'NRR', label: 'NRR' },
];
const TYPE_TABS = [
  { key: 'combined', label: 'Combined' },
  { key: 'Farming', label: 'Farming' },
  { key: 'Hunting', label: 'Hunting' },
];
const PERIOD_TABS = [
  { key: 'July', label: 'July', months: [7], settingsPeriod: 'July 2026' },
  { key: 'August', label: 'August', months: [8], settingsPeriod: 'August 2026' },
  { key: 'September', label: 'September', months: [9], settingsPeriod: 'September 2026' },
  { key: 'JAS', label: 'JAS', months: [7, 8, 9], settingsPeriod: null },
];

let DEALS = [], MRR_SNAPSHOTS = [], NRR_SNAPSHOTS = [], BU_TARGETS = [], TARGET_SETTINGS = [], NRR_TARGETS = [], BASELINE = [];
let MRR_DATES = [], NRR_DATES = [], BU_TAB_LIST = [];
let currentMetric = 'MRR';
let currentTypeTab = 'combined';
let currentPeriodTab = 'JAS';
let currentBU = '';
let buViewMode = 'table';
let searchText = '';
let tableBuFilter = '';
let sortKey = '__latest';
let sortDir = 'desc';

function fmtINR(n) {
  const sign = n < 0 ? '-' : '';
  return sign + '₹' + Math.abs(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
}

async function sb(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
  });
  if (!res.ok) throw new Error(`Supabase request failed: ${res.status} ${await res.text()}`);
  return res.json();
}

function colorVar(bu) {
  return `var(${BU_COLOR_VAR[bu] || '--series-8'})`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function nameChainHtml(deal) {
  const chain = [...(deal.name_history || []), deal.current_name];
  if (chain.length === 1) return escapeHtml(chain[0]);
  return `<span class="name-chain">${chain.slice(0, -1).map(escapeHtml).join('<span class="arrow">&gt;</span>')}<span class="arrow">&gt;</span></span>${escapeHtml(chain[chain.length - 1])}`;
}

function fullNameChainText(deal) {
  return [...(deal.name_history || []), deal.current_name].join(' > ');
}

function activeSnapshots() { return currentMetric === 'MRR' ? MRR_SNAPSHOTS : NRR_SNAPSHOTS; }
function activeDates() { return currentMetric === 'MRR' ? MRR_DATES : NRR_DATES; }
function amountOf(row) { return Number(currentMetric === 'MRR' ? row.mrr_amount : row.nrr_amount); }

// Target for a BU in the given period tab.
// MRR: JAS uses the base bu_targets row directly; July/August/September derive from
// target_settings (percent of the JAS target, or an absolute override).
// NRR: only a flat JAS target exists (nrr_targets) -- no monthly split has been defined yet.
function targetFor(bu, periodTab) {
  if (currentMetric === 'NRR') {
    if (periodTab.key !== 'JAS') return undefined;
    const row = NRR_TARGETS.find(t => t.business_unit === bu);
    return row ? Number(row.target_amount) : undefined;
  }
  const jasTarget = BU_TARGETS.find(t => t.business_unit === bu);
  const jasVal = jasTarget ? Number(jasTarget.target_amount) : undefined;
  if (periodTab.key === 'JAS') return jasVal;
  if (jasVal === undefined) return undefined;
  const setting = TARGET_SETTINGS.find(s => s.business_unit === bu && s.period === periodTab.settingsPeriod);
  if (!setting) return undefined;
  return setting.mode === 'absolute' ? Number(setting.value) : jasVal * (Number(setting.value) / 100);
}

function targetBUList() {
  return [...new Set((currentMetric === 'NRR' ? NRR_TARGETS : BU_TARGETS).map(t => t.business_unit))];
}

function dealInPeriod(deal, periodTab) {
  if (periodTab.key === 'JAS') return true;
  if (!deal.closing_date) return false;
  const month = Number(deal.closing_date.slice(5, 7));
  return periodTab.months.includes(month);
}

function renderTabs() {
  const metricEl = document.getElementById('metric-tabs');
  metricEl.innerHTML = METRIC_TABS.map(t => `<button class="tab-btn ${t.key === currentMetric ? 'active' : ''}" data-metric="${t.key}">${t.label}</button>`).join('');
  metricEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { currentMetric = btn.dataset.metric; sortKey = '__latest'; sortDir = 'desc'; render(); });
  });

  const periodEl = document.getElementById('period-tabs');
  periodEl.innerHTML = PERIOD_TABS.map(t => `<button class="tab-btn ${t.key === currentPeriodTab ? 'active' : ''}" data-period="${t.key}">${t.label}</button>`).join('');
  periodEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { currentPeriodTab = btn.dataset.period; render(); });
  });

  const typeEl = document.getElementById('type-tabs');
  typeEl.innerHTML = TYPE_TABS.map(t => `<button class="tab-btn ${t.key === currentTypeTab ? 'active' : ''}" data-type="${t.key}">${t.label}</button>`).join('');
  typeEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { currentTypeTab = btn.dataset.type; render(); });
  });

  const buEl = document.getElementById('bu-tabs');
  const buTabs = [{ key: '', label: 'All' }, ...BU_TAB_LIST.map(bu => ({ key: bu, label: bu }))];
  buEl.innerHTML = buTabs.map(t => `<button class="tab-btn ${t.key === currentBU ? 'active' : ''}" data-bu="${escapeHtml(t.key)}">${escapeHtml(t.label)}</button>`).join('');
  buEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { currentBU = btn.dataset.bu; render(); });
  });
}

async function main() {
  const content = document.getElementById('content');
  try {
    [DEALS, MRR_SNAPSHOTS, NRR_SNAPSHOTS, BU_TARGETS, TARGET_SETTINGS, NRR_TARGETS, BASELINE] = await Promise.all([
      sb('deals?select=*'),
      sb('mrr_snapshots?select=*&order=snapshot_date.asc'),
      sb('nrr_snapshots?select=*&order=snapshot_date.asc'),
      sb('bu_targets?select=*'),
      sb('target_settings?select=*'),
      sb('nrr_targets?select=*'),
      sb('bu_baseline_mrr?select=*'),
    ]);
  } catch (err) {
    content.innerHTML = `<div class="card"><p class="error">Failed to load data: ${err.message}</p></div>`;
    return;
  }
  MRR_DATES = [...new Set(MRR_SNAPSHOTS.map(s => s.snapshot_date))].sort();
  NRR_DATES = [...new Set(NRR_SNAPSHOTS.map(s => s.snapshot_date))].sort();
  const knownOrder = ['KAM BU', 'MEA BU', 'SEA BU', 'BAT BU', 'India MM BU', 'India ENT BU', 'SME BU'];
  const seen = new Set(DEALS.map(d => d.business_unit || 'UNMAPPED'));
  BU_TAB_LIST = [
    ...knownOrder.filter(bu => seen.has(bu)),
    ...[...seen].filter(bu => bu !== 'UNMAPPED' && !knownOrder.includes(bu)).sort(),
    ...(seen.has('UNMAPPED') ? ['UNMAPPED'] : []),
  ];
  renderTabs();
  render();
}

function render() {
  const content = document.getElementById('content');
  document.querySelectorAll('#metric-tabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.metric === currentMetric));
  document.querySelectorAll('#period-tabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.period === currentPeriodTab));
  document.querySelectorAll('#type-tabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.type === currentTypeTab));
  document.querySelectorAll('#bu-tabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.bu === currentBU));

  const metric = currentMetric;
  const snapshots = activeSnapshots();
  const dates = activeDates();
  const periodTab = PERIOD_TABS.find(p => p.key === currentPeriodTab);
  const dealsById = new Map(DEALS.map(d => [d.deal_id, d]));
  const inScope = dealId => {
    const d = dealsById.get(dealId);
    if (!d) return false;
    if (currentTypeTab !== 'combined' && d.deal_type !== currentTypeTab) return false;
    if (currentBU && (d.business_unit || 'UNMAPPED') !== currentBU) return false;
    return dealInPeriod(d, periodTab);
  };

  const latestDate = dates[dates.length - 1];
  document.getElementById('subtitle').textContent = latestDate
    ? `Latest ${metric} snapshot: ${latestDate} . ${dates.length} snapshot${dates.length === 1 ? '' : 's'} tracked`
    : `No ${metric} snapshots recorded yet`;
  const latest = snapshots.filter(s => s.snapshot_date === latestDate && inScope(s.deal_id));

  // ---- Stat tiles ----
  const total = latest.reduce((a, s) => a + amountOf(s), 0);
  const farmingTotal = snapshots.filter(s => s.snapshot_date === latestDate && dealsById.get(s.deal_id)?.deal_type === 'Farming' && inScope(s.deal_id)).reduce((a, s) => a + amountOf(s), 0);
  const huntingTotal = snapshots.filter(s => s.snapshot_date === latestDate && dealsById.get(s.deal_id)?.deal_type === 'Hunting' && inScope(s.deal_id)).reduce((a, s) => a + amountOf(s), 0);
  const unmappedDeals = latest.filter(s => (dealsById.get(s.deal_id)?.business_unit || 'UNMAPPED') === 'UNMAPPED');
  const allBUs = targetBUList();
  const targetTotal = currentBU
    ? (targetFor(currentBU, periodTab) || 0)
    : allBUs.reduce((a, bu) => a + (targetFor(bu, periodTab) || 0), 0);
  const attainment = targetTotal ? (total / targetTotal) * 100 : null;

  let statTiles = `
    <div class="stat-tile"><div class="stat-label">Total ${metric}${latestDate ? ` (${latestDate})` : ''}</div><div class="stat-value">${fmtINR(total)}</div></div>`;
  if (currentTypeTab === 'combined') {
    statTiles += `
    <div class="stat-tile">
      <div class="stat-label">Target (${periodTab.label})</div>
      <div class="stat-value">${fmtINR(targetTotal)}</div>
      <div class="stat-sub">${attainment === null ? '' : attainment.toFixed(1) + '% attained'}</div>
    </div>
    <div class="stat-tile"><div class="stat-label">Farming ${metric}</div><div class="stat-value">${fmtINR(farmingTotal)}</div></div>
    <div class="stat-tile"><div class="stat-label">Hunting ${metric}</div><div class="stat-value">${fmtINR(huntingTotal)}</div></div>`;
  }
  statTiles += `
    <div class="stat-tile">
      <div class="stat-label">Unmapped deals</div>
      <div class="stat-value ${unmappedDeals.length ? 'warn' : ''}">${unmappedDeals.length}</div>
    </div>`;

  // ---- Metric by Business Unit ----
  const buTotals = new Map();
  for (const s of latest) {
    const bu = dealsById.get(s.deal_id)?.business_unit || 'UNMAPPED';
    buTotals.set(bu, (buTotals.get(bu) || 0) + amountOf(s));
  }
  const showTargets = currentTypeTab === 'combined' && !currentBU;
  const buScope = currentBU ? [currentBU] : allBUs;
  if (currentTypeTab === 'combined') {
    // A BU with a target but zero deals this week is a full miss, not a row to hide.
    for (const bu of buScope) if (!buTotals.has(bu)) buTotals.set(bu, 0);
  }
  if (currentBU) {
    for (const [bu] of [...buTotals]) if (bu !== currentBU) buTotals.delete(bu);
  }
  const buRows = [...buTotals.entries()].sort((a, b) => b[1] - a[1]);
  const maxAbs = Math.max(
    ...buRows.map(([, v]) => Math.abs(v)),
    ...(showTargets ? allBUs.map(bu => targetFor(bu, periodTab) || 0) : []),
    1
  );

  // ---- Trend over time ----
  const trend = dates.map(date => ({
    date,
    total: snapshots.filter(s => s.snapshot_date === date && inScope(s.deal_id)).reduce((a, s) => a + amountOf(s), 0),
  }));

  content.innerHTML = `
    <div class="stat-row">${statTiles}</div>

    <div class="card">
      <div class="card-head">
        <h2>${metric} by Business Unit ${showTargets ? `<span class="hint">vs ${periodTab.label} target</span>` : ''}</h2>
        <div class="view-toggle" id="bu-view-toggle">
          <button data-mode="table" class="${buViewMode === 'table' ? 'active' : ''}">Table</button>
          <button data-mode="chart" class="${buViewMode === 'chart' ? 'active' : ''}">Chart</button>
        </div>
      </div>
      <div id="bu-view"></div>
      ${buViewMode === 'chart' ? `<div class="legend">
        <div class="legend-item"><span class="legend-swatch" style="background:var(--series-1);"></span>Net add</div>
        <div class="legend-item"><span class="legend-swatch" style="background:var(--series-6);"></span>Net churn</div>
        <div class="legend-item"><span class="legend-swatch" style="background:var(--warning);"></span>Unmapped</div>
        ${showTargets ? `<div class="legend-item"><span class="legend-swatch tick"></span>Target</div>` : ''}
      </div>` : ''}
    </div>

    ${currentTypeTab === 'combined' ? `
    <div class="card">
      <h2>Farming vs Hunting</h2>
      <div id="split-chart"></div>
    </div>` : ''}

    <div class="card">
      <h2>${metric} trend over time</h2>
      <div id="trend-chart"></div>
    </div>

    <div class="card">
      <h2>Reference: current book and NRR targets</h2>
      <div class="ref-grid">
        <div>
          <table class="ref-table">
            <thead><tr><th>Business Unit</th><th class="num">Current MRR (June exit)</th></tr></thead>
            <tbody>${BASELINE.slice().sort((a, b) => Number(b.mrr_amount) - Number(a.mrr_amount)).map(b => `<tr><td>${escapeHtml(b.business_unit)}</td><td class="num">${fmtINR(Number(b.mrr_amount))}</td></tr>`).join('')}</tbody>
          </table>
        </div>
        <div>
          <table class="ref-table">
            <thead><tr><th>Business Unit</th><th class="num">NRR Target (${NRR_TARGETS[0]?.period || ''})</th></tr></thead>
            <tbody>${NRR_TARGETS.slice().sort((a, b) => Number(b.target_amount) - Number(a.target_amount)).map(b => `<tr><td>${escapeHtml(b.business_unit)}</td><td class="num">${fmtINR(Number(b.target_amount))}</td></tr>`).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Deals - ${metric} by snapshot date</h2>
      <div class="table-controls">
        <input class="search-input" id="deal-search" type="text" placeholder="Search deal id, deal name, account, BU, type..." value="${escapeHtml(searchText)}">
        <select class="filter-select" id="bu-filter">
          <option value="">All business units</option>
        </select>
        <span class="result-count" id="result-count"></span>
      </div>
      <div id="deals-table"></div>
    </div>
  `;

  renderBUView(buRows, maxAbs, showTargets, periodTab);

  document.getElementById('bu-view-toggle').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => { buViewMode = btn.dataset.mode; render(); });
  });

  // Farming vs Hunting split (combined type tab only)
  if (currentTypeTab === 'combined') {
    const splitChart = document.getElementById('split-chart');
    const splitTotal = Math.abs(farmingTotal) + Math.abs(huntingTotal) || 1;
    const farmPct = (Math.abs(farmingTotal) / splitTotal) * 100;
    const huntPct = 100 - farmPct;
    splitChart.innerHTML = `
      <div class="split-row">
        <div class="split-seg" style="width:${farmPct}%; background:var(--series-1);" title="Farming: ${fmtINR(farmingTotal)}">${farmPct > 12 ? 'Farming' : ''}</div>
        <div class="split-seg" style="width:${huntPct}%; background:var(--series-6);" title="Hunting: ${fmtINR(huntingTotal)}">${huntPct > 12 ? 'Hunting' : ''}</div>
      </div>
      <div class="legend">
        <div class="legend-item"><span class="legend-swatch" style="background:var(--series-1);"></span>Farming . ${fmtINR(farmingTotal)}</div>
        <div class="legend-item"><span class="legend-swatch" style="background:var(--series-6);"></span>Hunting . ${fmtINR(huntingTotal)}</div>
      </div>
    `;
  }

  // Trend line (SVG)
  const trendChart = document.getElementById('trend-chart');
  if (trend.length === 0) {
    trendChart.innerHTML = `<p class="muted">No ${metric} snapshots recorded yet for this view.</p>`;
  } else if (trend.length === 1) {
    trendChart.innerHTML = `<p class="muted">Only one snapshot recorded so far (${trend[0].date}: ${fmtINR(trend[0].total)}). Trend line will appear once weekly syncs accumulate more dates.</p>`;
  } else {
    const w = 1000, h = 220, padL = 70, padB = 30, padT = 20, padR = 20;
    const vals = trend.map(t => t.total);
    const minV = Math.min(0, ...vals), maxV = Math.max(...vals);
    const x = i => padL + (i / (trend.length - 1)) * (w - padL - padR);
    const y = v => h - padB - ((v - minV) / (maxV - minV || 1)) * (h - padT - padB);
    const points = trend.map((t, i) => `${x(i)},${y(t.total)}`).join(' ');
    const gridLines = [0, 0.25, 0.5, 0.75, 1].map(f => {
      const yy = padT + f * (h - padT - padB);
      const val = maxV - f * (maxV - minV);
      return `<line x1="${padL}" y1="${yy}" x2="${w - padR}" y2="${yy}" stroke="var(--gridline)" stroke-width="1"/>
              <text x="${padL - 10}" y="${yy + 4}" font-size="11" fill="var(--text-muted)" text-anchor="end">${fmtINR(Math.round(val))}</text>`;
    }).join('');
    const dots = trend.map((t, i) => `<circle cx="${x(i)}" cy="${y(t.total)}" r="4" fill="var(--series-1)" stroke="var(--surface-1)" stroke-width="2"><title>${t.date}: ${fmtINR(t.total)}</title></circle>`).join('');
    const labels = trend.map((t, i) => `<text x="${x(i)}" y="${h - 8}" font-size="11" fill="var(--text-muted)" text-anchor="middle">${t.date}</text>`).join('');
    trendChart.innerHTML = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
      ${gridLines}
      <polyline points="${points}" fill="none" stroke="var(--series-1)" stroke-width="2"/>
      ${dots}
      ${labels}
    </svg>`;
  }

  tableCtx = { dealsById, periodTab, latestDate, snapshots, metric };
  renderDealsTable();

  // Search/filter listeners are attached once per full page rebuild (tab switch), on the
  // freshly-created input/select nodes. Typing calls renderDealsTable() directly, which only
  // touches the table body/options -- never the input itself -- so focus and cursor position survive.
  document.getElementById('deal-search').addEventListener('input', e => { searchText = e.target.value; renderDealsTable(); });
  document.getElementById('bu-filter').addEventListener('change', e => { tableBuFilter = e.target.value; renderDealsTable(); });
}

// Metric-by-BU section: table view (default) or diverging bar chart.
function renderBUView(buRows, maxAbs, showTargets, periodTab) {
  const el = document.getElementById('bu-view');
  if (buRows.length === 0) { el.innerHTML = '<p class="muted">No deals in this view for the latest snapshot.</p>'; return; }

  if (buViewMode === 'table') {
    const rows = buRows.map(([bu, val]) => {
      const isUnmapped = bu === 'UNMAPPED';
      const target = showTargets ? targetFor(bu, periodTab) : undefined;
      const attain = target ? (val / target) * 100 : null;
      return `<tr>
        <td>${isUnmapped ? `<span class="badge">UNMAPPED</span>` : escapeHtml(bu)}</td>
        <td class="num">${fmtINR(val)}</td>
        ${showTargets ? `<td class="num">${target === undefined ? '<span class="muted">-</span>' : fmtINR(target)}</td>
        <td class="num">${attain === null ? '<span class="muted">-</span>' : attain.toFixed(1) + '%'}</td>` : ''}
      </tr>`;
    }).join('');
    el.innerHTML = `<div class="table-scroll"><table>
      <thead><tr><th>Business Unit</th><th class="num">Actual</th>${showTargets ? '<th class="num">Target</th><th class="num">Attainment</th>' : ''}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
    return;
  }

  // Diverging bar chart: net add (positive) vs net churn (negative) share a zero baseline,
  // since a same-length fill on a one-sided bar would make a churning BU visually
  // indistinguishable from a growing one. Target shown as a tick mark.
  el.innerHTML = '';
  buRows.forEach(([bu, val]) => {
    const pct = (Math.abs(val) / maxAbs) * 100;
    const isUnmapped = bu === 'UNMAPPED';
    const fillColor = isUnmapped ? 'var(--warning)' : (val < 0 ? 'var(--series-6)' : 'var(--series-1)');
    const target = showTargets ? targetFor(bu, periodTab) : undefined;
    const targetPct = target !== undefined ? (target / maxAbs) * 100 : null;
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.title = `${bu}: ${fmtINR(val)}${target !== undefined ? ` (target ${fmtINR(target)})` : ''}`;
    row.innerHTML = `
      <div class="bar-label">${isUnmapped ? 'UNMAPPED' : escapeHtml(bu)}</div>
      <div class="bar-track">
        <div class="bar-half">${val < 0 ? `<div class="bar-fill neg" style="width:${pct}%; background:${fillColor};"></div>` : ''}</div>
        <div class="bar-half">
          ${val >= 0 ? `<div class="bar-fill pos" style="width:${pct}%; background:${fillColor};"></div>` : ''}
          ${targetPct !== null ? `<div class="target-tick" style="left:${targetPct}%;" data-label="${fmtINR(target)}"></div>` : ''}
        </div>
      </div>
      <div class="bar-value">${fmtINR(val)}</div>
    `;
    el.appendChild(row);
  });
}

let tableCtx = {};

function renderDealsTable() {
  const { dealsById, periodTab, latestDate, snapshots, metric } = tableCtx;
  const dates = activeDates();
  const snapshotsByDeal = new Map();
  for (const s of snapshots) {
    if (!snapshotsByDeal.has(s.deal_id)) snapshotsByDeal.set(s.deal_id, new Map());
    snapshotsByDeal.get(s.deal_id).set(s.snapshot_date, amountOf(s));
  }

  let tabDeals = DEALS.filter(d => currentTypeTab === 'combined' || d.deal_type === currentTypeTab)
    .filter(d => !currentBU || (d.business_unit || 'UNMAPPED') === currentBU)
    .filter(d => dealInPeriod(d, periodTab))
    .filter(d => snapshotsByDeal.has(d.deal_id));

  // BU filter dropdown -- populate options once per render from the full (pre-search) tab scope.
  const buOptions = [...new Set(tabDeals.map(d => d.business_unit || 'UNMAPPED'))].sort();
  const buFilterEl = document.getElementById('bu-filter');
  buFilterEl.innerHTML = `<option value="">All business units</option>` +
    buOptions.map(bu => `<option value="${escapeHtml(bu)}" ${bu === tableBuFilter ? 'selected' : ''}>${escapeHtml(bu)}</option>`).join('');

  if (tableBuFilter) tabDeals = tabDeals.filter(d => (d.business_unit || 'UNMAPPED') === tableBuFilter);
  if (searchText.trim()) {
    const q = searchText.trim().toLowerCase();
    tabDeals = tabDeals.filter(d => {
      const bu = d.business_unit || 'UNMAPPED';
      return d.deal_id.toLowerCase().includes(q) ||
        fullNameChainText(d).toLowerCase().includes(q) ||
        (d.account_name || '').toLowerCase().includes(q) ||
        bu.toLowerCase().includes(q) ||
        (d.deal_type || '').toLowerCase().includes(q);
    });
  }

  const comparator = (a, b) => {
    const byDateA = snapshotsByDeal.get(a.deal_id), byDateB = snapshotsByDeal.get(b.deal_id);
    let va, vb;
    if (sortKey === '__latest') { va = byDateA.get(latestDate); vb = byDateB.get(latestDate); }
    else if (dates.includes(sortKey)) { va = byDateA.get(sortKey); vb = byDateB.get(sortKey); }
    else if (sortKey === 'deal_id') { va = a.deal_id; vb = b.deal_id; }
    else if (sortKey === 'deal_name') { va = a.current_name; vb = b.current_name; }
    else if (sortKey === 'account_name') { va = a.account_name || ''; vb = b.account_name || ''; }
    else if (sortKey === 'business_unit') { va = a.business_unit || 'UNMAPPED'; vb = b.business_unit || 'UNMAPPED'; }
    else if (sortKey === 'deal_type') { va = a.deal_type || ''; vb = b.deal_type || ''; }
    const aMissing = va === undefined || va === null;
    const bMissing = vb === undefined || vb === null;
    if (aMissing && bMissing) return 0;
    if (aMissing) return 1;
    if (bMissing) return -1;
    let cmp;
    if (typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb));
    return sortDir === 'asc' ? cmp : -cmp;
  };
  tabDeals = tabDeals.sort(comparator);

  document.getElementById('result-count').textContent = `${tabDeals.length} deal${tabDeals.length === 1 ? '' : 's'}`;

  const arrow = key => key === sortKey ? `<span class="sort-arrow">${sortDir === 'asc' ? '↑' : '↓'}</span>` : '';
  const dateHeaders = dates.map(d => `<th class="num" data-sort="${d}">${d}${arrow(sortKey === '__latest' && d === latestDate ? '__latest' : d)}</th>`).join('');
  const rows = tabDeals.map(d => {
    const bu = d.business_unit || 'UNMAPPED';
    const buCell = bu === 'UNMAPPED' ? `<span class="badge">UNMAPPED</span>` : escapeHtml(bu);
    const byDate = snapshotsByDeal.get(d.deal_id);
    const dateCells = dates.map(date => {
      const v = byDate.get(date);
      return `<td class="num">${v === undefined ? '<span class="muted">-</span>' : fmtINR(v)}</td>`;
    }).join('');
    const link = ZOHO_DEAL_URL(d.deal_id);
    return `<tr>
      <td><a class="zoho-link" href="${link}" target="_blank" rel="noopener">${escapeHtml(d.deal_id)}</a></td>
      <td class="name-cell"><a class="zoho-link" href="${link}" target="_blank" rel="noopener">${nameChainHtml(d)}</a></td>
      <td>${escapeHtml(d.account_name || '')}</td>
      <td>${buCell}</td>
      <td>${escapeHtml(d.deal_type || '')}</td>
      ${dateCells}
    </tr>`;
  }).join('');
  const dealsTable = document.getElementById('deals-table');
  if (dates.length === 0) {
    dealsTable.innerHTML = `<p class="muted">No ${metric} snapshots recorded yet.</p>`;
    return;
  }
  dealsTable.innerHTML = `<div class="table-scroll"><table>
    <thead><tr>
      <th data-sort="deal_id">Deal ID${arrow('deal_id')}</th>
      <th data-sort="deal_name">Deal Name${arrow('deal_name')}</th>
      <th data-sort="account_name">Account Name${arrow('account_name')}</th>
      <th data-sort="business_unit">Business Unit${arrow('business_unit')}</th>
      <th data-sort="deal_type">Type${arrow('deal_type')}</th>
      ${dateHeaders}
    </tr></thead>
    <tbody>${rows || `<tr><td colspan="${5 + dates.length}" class="muted">No matching deals.</td></tr>`}</tbody>
  </table></div>`;

  dealsTable.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = key; sortDir = key === '__latest' || dates.includes(key) ? 'desc' : 'asc'; }
      renderDealsTable();
    });
  });
}

main();
</script>
