      <label style="font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:8px;">GROUP BY</label>
      <div style="display:flex;gap:6px;">
        <button class="vb-grp-btn stage-capsule${curGroupBy === 'deal' ? ' active' : ''}" data-grp="deal">Deal</button>
        <button class="vb-grp-btn stage-capsule${curGroupBy === 'account' ? ' active' : ''}" data-grp="account">Account</button>
        <button class="vb-grp-btn stage-capsule${curGroupBy === 'bu' ? ' active' : ''}" data-grp="bu">Business Unit</button>
      </div>
    </div>` : `
    <div style="margin-bottom:20px;">
      <label style="font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:8px;">COLUMNS TO SHOW</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;">${colCheckboxesHtml}</div>
    </div>`}

    <div style="display:flex;gap:8px;">
      <button id="vb-save" style="padding:8px 18px;border-radius:8px;border:none;background:var(--series-1,#3b82f6);color:#fff;font-size:13px;font-weight:600;cursor:pointer;">
        ${editId ? 'Update View' : 'Save View'}
      </button>
      ${editId ? `<button id="vb-delete" style="padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--bad,#ef4444);font-size:13px;cursor:pointer;">Delete</button>` : ''}
      <button id="vb-cancel" style="margin-left:auto;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;">Cancel</button>
    </div>`;

  overlay.style.display = 'flex';

  panel.querySelector('#vb-close').onclick = () => { overlay.style.display = 'none'; };
  panel.querySelector('#vb-cancel').onclick = () => { overlay.style.display = 'none'; };
  overlay.onclick = e => { if (e.target === overlay) overlay.style.display = 'none'; };

  panel.querySelectorAll('.vb-type-cap').forEach(btn => {
    btn.onclick = () => { btn.classList.toggle('active'); };
  });

  panel.querySelectorAll('.vb-stage-cap').forEach(btn => {
    btn.onclick = () => { btn.classList.toggle('active'); };
  });
  panel.querySelector('#vb-stages-all').onclick = () =>
    panel.querySelectorAll('.vb-stage-cap').forEach(b => b.classList.add('active'));
  panel.querySelector('#vb-stages-none').onclick = () =>
    panel.querySelectorAll('.vb-stage-cap').forEach(b => b.classList.remove('active'));

  panel.querySelectorAll('.vb-grp-btn').forEach(btn => {
    btn.onclick = () => {
      panel.querySelectorAll('.vb-grp-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  panel.querySelector('#vb-save').onclick = async () => {
    const viewName = panel.querySelector('#vb-name').value.trim();
    if (!viewName) { alert('Please enter a view name.'); return; }

    const deal_types = [...panel.querySelectorAll('.vb-type-cap.active')].map(b => b.dataset.val);
    const stages = [...panel.querySelectorAll('.vb-stage-cap.active')].map(b => b.dataset.val);
    const min_probability = Math.max(0, Math.min(100, parseInt(panel.querySelector('#vb-prob').value) || 0));
    const visible_columns = [...panel.querySelectorAll('.vb-col-chk:checked')].map(b => b.dataset.col);
    const group_by = panel.querySelector('.vb-grp-btn.active')?.dataset?.grp || 'deal';

    const payload = { name: viewName, deal_types, stages, min_probability, visible_columns,
      view_context: viewContext, group_by };

    try {
      if (editId) {
        await sbPost(`pipeline_views?id=eq.${editId}`, payload, 'PATCH');
      } else {
        payload.display_order = PIPELINE_VIEWS.length;
        await sbPost('pipeline_views', payload, 'POST');
      }
      PIPELINE_VIEWS = await sb('pipeline_views?select=*&order=display_order.asc');
      overlay.style.display = 'none';
      if (viewContext === 'commits') renderReviewView(); else renderSummaryView();
    } catch (err) {
      alert('Failed to save view: ' + err.message);
    }
  };

  panel.querySelector('#vb-delete')?.addEventListener('click', async () => {
    if (!confirm('Delete this view?')) return;
    try {
      await sbPost(`pipeline_views?id=eq.${editId}`, null, 'DELETE');
      PIPELINE_VIEWS = await sb('pipeline_views?select=*&order=display_order.asc');
      if (activePipelineView?.id === editId) activePipelineView = null;
      if (activeCommitView?.id === editId) activeCommitView = null;
      overlay.style.display = 'none';
      if (viewContext === 'commits') renderReviewView(); else renderSummaryView();
    } catch (err) {
      alert('Failed to delete view: ' + err.message);
    }
  });
}

// ============================================================
// HUNTING PIPELINE VIEW
// ============================================================
function renderHuntingView() {
  const q = QUARTERS.find(x => x.key === currentQuarter) || QUARTERS[1];
  const dealsById = new Map(DEALS.map(d => [d.deal_id, d]));

  const allPipelineDeals = (HUNTING_PIPELINE || []).filter(d => d.quarter === currentQuarter);
  // Exclude Closed Lost from the main stage list — it has its own toggle button
  const allStages = [...new Set(allPipelineDeals.map(d => d.stage || 'Unknown').filter(s => s !== 'Closed Lost'))].sort();

  // BU list: sort known BUs by BU_ORDER, then others, UNMAPPED last
  const buSet = new Set(allPipelineDeals.map(d => d.business_unit || 'UNMAPPED'));
  const allBUs = [
    ...BU_ORDER.filter(bu => buSet.has(bu)),
    ...[...buSet].filter(bu => bu !== 'UNMAPPED' && !BU_ORDER.includes(bu)).sort(),
    ...(buSet.has('UNMAPPED') ? ['UNMAPPED'] : []),
  ];
  if (huntingBUFilter === null) huntingBUFilter = new Set(allBUs);

  // Latest sync date from snapshots or hunting_pipeline updated_at
  const latestSyncTs = (() => {
    const snapDates = (HUNTING_SNAPSHOTS || [])
      .filter(s => s.quarter === currentQuarter)
      .map(s => s.synced_at).filter(Boolean);
    const updDates = allPipelineDeals.map(d => d.updated_at).filter(Boolean);
    const all = [...snapDates, ...updDates].sort();
    return all[all.length - 1] || null;
  })();
  const fetchedLabel = latestSyncTs
    ? `Last fetched: ${new Date(latestSyncTs).toLocaleString('en-IN', {dateStyle:'medium',timeStyle:'short'})}`
    : '';

  document.getElementById('subtitle').textContent = `Hunting Pipeline: all new-account deals closing in ${q.label} (any probability)`;

  const stageCapsulesHtml = allStages.map(stage => {
    const active = huntingStageFilter.has(stage);
    return `<button class="stage-capsule${active ? ' active' : ''}" data-stage="${escapeHtml(stage)}">${escapeHtml(stage)}</button>`;
  }).join('');
  const closedLostActive = huntingShowClosedLost;

  const buCapsulesHtml = allBUs.map(bu => {
    const active = huntingBUFilter.has(bu);
    const dot = bu !== 'UNMAPPED'
      ? `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${colorVar(bu)};margin-right:5px;vertical-align:middle;"></span>`
      : '';
    return `<button class="stage-capsule${active ? ' active' : ''}" data-bu="${escapeHtml(bu)}">${dot}${escapeHtml(bu)}</button>`;
  }).join('');

  const deals = allPipelineDeals.filter(d => {
    if (d.stage === 'Closed Lost') { if (!huntingShowClosedLost) return false; }
    else if (!huntingStageFilter.has(d.stage || 'Unknown')) return false;
    return huntingBUFilter.has(d.business_unit || 'UNMAPPED');
  });

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px;">
        <p class="summary-section-title" style="margin:0;">Hunting Pipeline · ${q.label} · ${deals.length} deals</p>
        ${fetchedLabel ? `<span style="font-size:12px;color:var(--text-muted);">${fetchedLabel}</span>` : ''}
        <div style="margin-left:auto;display:flex;gap:6px;">
          <button class="stage-capsule${huntingViewMode === 'summary' ? ' active' : ''}" id="hunting-view-summary">Summary</button>
          <button class="stage-capsule${huntingViewMode === 'detail' ? ' active' : ''}" id="hunting-view-detail">Movement</button>
        </div>
      </div>
      <div style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
        <span style="font-size:12px;color:var(--text-muted);margin-right:4px;">Stages:</span>
        ${stageCapsulesHtml}
        <button class="stage-capsule${closedLostActive ? ' active' : ''} stage-closed-lost" data-stage="Closed Lost">Closed Lost</button>
      </div>
      <div style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
        <span style="font-size:12px;color:var(--text-muted);margin-right:4px;">BU:</span>
        ${buCapsulesHtml}
      </div>
      <div id="hunting-table-wrap"></div>
      <div class="legend" style="margin-top:12px;">
        <div class="legend-item"><span class="prob-high">70%+</span> committed</div>
        <div class="legend-item"><span class="prob-mid">40-69%</span> likely</div>
        <div class="legend-item"><span class="prob-low">below 40%</span> early stage</div>
        <div class="legend-item" style="margin-left:16px;">Adj. = Expected × Probability</div>
      </div>
    </div>`;

  content.querySelectorAll('.stage-capsule[data-stage]').forEach(btn => {
    btn.addEventListener('click', () => {
      const stage = btn.dataset.stage;
      if (stage === 'Closed Lost') {
        huntingShowClosedLost = !huntingShowClosedLost;
      } else {
        if (huntingStageFilter.has(stage)) huntingStageFilter.delete(stage);
        else huntingStageFilter.add(stage);
      }
      renderHuntingView();
    });
  });

  content.querySelectorAll('.stage-capsule[data-bu]').forEach(btn => {
    btn.addEventListener('click', () => {
      const bu = btn.dataset.bu;
      if (huntingBUFilter.has(bu)) huntingBUFilter.delete(bu);
      else huntingBUFilter.add(bu);
      renderHuntingView();
    });
  });

  document.getElementById('hunting-view-summary')?.addEventListener('click', () => {
    huntingViewMode = 'summary'; renderHuntingView();
  });
  document.getElementById('hunting-view-detail')?.addEventListener('click', () => {
    huntingViewMode = 'detail'; renderHuntingView();
  });

  if (huntingViewMode === 'detail') {
    renderHuntingDetailView(deals, dealsById, q);
  } else {
    renderHuntingTable(deals, dealsById, q);
  }
}

function renderHuntingTable(deals, dealsById, q) {
  const wrap = document.getElementById('hunting-table-wrap');
  if (!wrap) return;

  if (deals.length === 0) {
    wrap.innerHTML = `<p class="muted">No deals match the selected stages. Adjust filters above.</p>`;
    return;
  }

  // Group by closing month
  const byMonth = new Map();
  for (const d of deals) {
    const m = d.closing_date ? Number(d.closing_date.slice(5, 7)) : 0;
    if (!byMonth.has(m)) byMonth.set(m, []);
    byMonth.get(m).push(d);
  }
  const sortedMonths = [...byMonth.keys()].sort((a, b) => a - b);

  let grandMRR = 0, grandAdjMRR = 0, grandNRR = 0, grandAdjNRR = 0;

  const monthGroupsHtml = sortedMonths.map((m, idx) => {
    const monthDeals = byMonth.get(m).slice().sort((a, b) => (a.closing_date || '').localeCompare(b.closing_date || ''));
    const monthName  = m ? MONTH_FULL[m - 1] : 'No Date';
    const monthClass = `month-${idx + 1}`;
    let mMRR = 0, mAdjMRR = 0, mNRR = 0, mAdjNRR = 0;
    for (const d of monthDeals) {
      mMRR    += d.mrr_inr || 0;
      mAdjMRR += (d.mrr_inr || 0) * (d.probability || 0) / 100;
      mNRR    += d.nrr_inr || 0;
      mAdjNRR += (d.nrr_inr || 0) * (d.probability || 0) / 100;
    }
    grandMRR += mMRR; grandAdjMRR += mAdjMRR; grandNRR += mNRR; grandAdjNRR += mAdjNRR;

    const probClass = p => p >= 70 ? 'prob-high' : p >= 40 ? 'prob-mid' : 'prob-low';
    const rowsHtml = monthDeals.map(d => {
      const bu = d.business_unit || dealsById.get(d.deal_id)?.business_unit || '';
      return `<tr>
        <td class="name-cell"><a class="zoho-link" href="${ZOHO_DEAL_URL(d.deal_id)}" target="_blank" rel="noopener">${escapeHtml(d.deal_name || d.deal_id)}</a></td>
        <td>${bu ? `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${colorVar(bu)};margin-right:5px;vertical-align:middle;"></span>${escapeHtml(bu)}` : '<span class="muted">-</span>'}</td>
        <td>${escapeHtml(d.stage || '-')}</td>
        <td class="num"><span class="${probClass(d.probability)}">${d.probability}%</span></td>
        <td class="num">${d.mrr_inr ? fmtINR(d.mrr_inr) : '<span class="muted">-</span>'}</td>
        <td class="num">${d.mrr_inr ? fmtINR(Math.round(d.mrr_inr * (d.probability || 0) / 100)) : '<span class="muted">-</span>'}</td>
        <td class="num">${d.nrr_inr ? fmtINR(d.nrr_inr) : '<span class="muted">-</span>'}</td>
        <td class="num">${d.nrr_inr ? fmtINR(Math.round(d.nrr_inr * (d.probability || 0) / 100)) : '<span class="muted">-</span>'}</td>
      </tr>`;
    }).join('');

    return `<tr class="month-group-row ${monthClass}">
  <td colspan="4">${monthName} · ${monthDeals.length} deal${monthDeals.length === 1 ? '' : 's'}</td>
  <td class="num">${fmtINR(Math.round(mMRR))}</td>
  <td class="num">${fmtINR(Math.round(mAdjMRR))}</td>
  <td class="num">${fmtINR(Math.round(mNRR))}</td>
  <td class="num">${fmtINR(Math.round(mAdjNRR))}</td>
</tr>
${rowsHtml}`;
  }).join('');

  const grandTotalRow = `<tr class="hunting-grand-total">
    <td colspan="4">Grand Total (${deals.length} deals)</td>
    <td class="num">${fmtINR(Math.round(grandMRR))}</td>
    <td class="num">${fmtINR(Math.round(grandAdjMRR))}</td>
    <td class="num">${fmtINR(Math.round(grandNRR))}</td>
    <td class="num">${fmtINR(Math.round(grandAdjNRR))}</td>
  </tr>`;

  const huntExpHeaders = ['Deal Name', 'Business Unit', 'Stage', 'Probability%', 'Exp MRR', 'Adj MRR', 'Exp NRR', 'Adj NRR', 'Closing Date'];
  const huntExpRows = deals.map(d => [
    d.deal_name || d.deal_id, d.business_unit || '', d.stage || '',
    d.probability || 0,
    d.mrr_inr || 0, Math.round((d.mrr_inr || 0) * (d.probability || 0) / 100),
    d.nrr_inr || 0, Math.round((d.nrr_inr || 0) * (d.probability || 0) / 100),
    d.closing_date || '',
  ]);
  wrap.innerHTML = `<div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
    <button class="sync-btn" id="hunt-sum-xbtn">↓ Export</button>
  </div><div class="table-scroll"><table>
    <thead><tr>
      <th>Deal Name</th>
      <th>Business Unit</th>
      <th>Stage</th>
      <th class="num">Probability</th>
      <th class="num">Exp. MRR</th>
      <th class="num">Adj. MRR</th>
      <th class="num">Exp. NRR</th>
      <th class="num">Adj. NRR</th>
    </tr></thead>
    <tbody>${grandTotalRow}${monthGroupsHtml}</tbody>
  </table></div>`;
  document.getElementById('hunt-sum-xbtn').onclick = () =>
    downloadXLSX(`Hunting_${q.label}_${currentQuarter}`, huntExpHeaders, huntExpRows);
}

// ============================================================
// HUNTING DETAIL VIEW (movement between two snapshots)
// ============================================================
function renderHuntingDetailView(deals, dealsById, q) {
  const wrap = document.getElementById('hunting-table-wrap');
  if (!wrap) return;

  const snapshots = (HUNTING_SNAPSHOTS || []).filter(s => s.quarter === currentQuarter);
  const syncTimes = [...new Set(snapshots.map(s => s.synced_at))].sort();

  if (syncTimes.length < 2) {
    wrap.innerHTML = `<p class="muted">Movement tracking needs at least 2 syncs recorded after today's update. Run the sync ${syncTimes.length === 0 ? 'twice' : 'once more'} to see changes here.</p>`;
    return;
  }

  const latestTime = syncTimes[syncTimes.length - 1];
  const prevTime   = syncTimes[syncTimes.length - 2];

  const byId = ts => {
    const m = new Map();
    snapshots.filter(s => s.synced_at === ts).forEach(s => m.set(s.deal_id, s));
    return m;
  };
  const latestMap = byId(latestTime);
  const prevMap   = byId(prevTime);

  const allIds = new Set([...latestMap.keys(), ...prevMap.keys()]);
  const rows = [];

  for (const id of allIds) {
    const cur  = latestMap.get(id);
    const prev = prevMap.get(id);

    if (!prev && cur) {
      rows.push({ type: 'added', deal: cur });
    } else if (prev && !cur) {
      rows.push({ type: 'dropped', deal: prev });
    } else if (cur && prev) {
      const changes = [];
      if (cur.stage !== prev.stage) changes.push({ field: 'Stage', from: prev.stage, to: cur.stage });
      if (Number(cur.probability) !== Number(prev.probability)) changes.push({ field: 'Probability', from: prev.probability + '%', to: cur.probability + '%' });
      if (cur.deal_name !== prev.deal_name) changes.push({ field: 'Name', from: prev.deal_name, to: cur.deal_name });
      if (Math.round(cur.mrr_inr) !== Math.round(prev.mrr_inr)) changes.push({ field: 'Exp. MRR', from: fmtINR(prev.mrr_inr), to: fmtINR(cur.mrr_inr) });
      if (Math.round(cur.nrr_inr) !== Math.round(prev.nrr_inr)) changes.push({ field: 'Exp. NRR', from: fmtINR(prev.nrr_inr), to: fmtINR(cur.nrr_inr) });
      if (changes.length > 0) rows.push({ type: 'changed', deal: cur, changes });
    }
  }

  if (rows.length === 0) {
    wrap.innerHTML = `<p class="muted">No changes detected between the last two syncs (${prevTime.slice(0,10)} → ${latestTime.slice(0,10)}).</p>`;
    return;
  }

  const fmtTs = ts => new Date(ts).toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'});
  const changeHtml = changes => changes.map(c => {
    const isPositive = field => ['Probability','Exp. MRR','Exp. NRR'].includes(field);
    const better = (c.field === 'Probability' || c.field === 'Exp. MRR' || c.field === 'Exp. NRR')
      ? (parseFloat(c.to) > parseFloat(c.from))
      : null;
    const toCls = better === true ? 'var-pos' : better === false ? 'var-neg' : '';
    return `<span style="margin-right:8px;font-size:12px;">${escapeHtml(c.field)}: <span class="muted">${escapeHtml(c.from)}</span> → <span class="${toCls}">${escapeHtml(c.to)}</span></span>`;
  }).join('');

  const rowsHtml = rows.map(r => {
    const d = r.deal;
    const bu = d.business_unit || '';
    const buDot = bu ? `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${colorVar(bu)};margin-right:5px;vertical-align:middle;"></span>` : '';
    let badge = '', detail = '';
    if (r.type === 'added') {
      badge = `<span class="badge" style="background:var(--green,#22c55e);color:#fff;">Added</span>`;
      detail = `MRR ${fmtINR(d.mrr_inr || 0)} · NRR ${fmtINR(d.nrr_inr || 0)} · ${d.probability}% · ${escapeHtml(d.stage || '')}`;
    } else if (r.type === 'dropped') {
      badge = `<span class="badge" style="background:var(--red,#ef4444);color:#fff;">Dropped</span>`;
      detail = `was: MRR ${fmtINR(d.mrr_inr || 0)} · NRR ${fmtINR(d.nrr_inr || 0)} · ${d.probability}% · ${escapeHtml(d.stage || '')}`;
    } else {
      badge = `<span class="badge" style="background:var(--accent,#3b82f6);color:#fff;">Changed</span>`;
      detail = changeHtml(r.changes);
    }
    return `<tr>
      <td>${badge}</td>
      <td class="name-cell"><a class="zoho-link" href="${ZOHO_DEAL_URL(d.deal_id)}" target="_blank" rel="noopener">${escapeHtml(d.deal_name || d.deal_id)}</a></td>
      <td>${buDot}${escapeHtml(bu || '-')}</td>
      <td>${escapeHtml(d.stage || '-')}</td>
      <td style="font-size:12px;">${detail}</td>
    </tr>`;
  }).join('');

  const added = rows.filter(r => r.type === 'added').length;
  const dropped = rows.filter(r => r.type === 'dropped').length;
  const changed = rows.filter(r => r.type === 'changed').length;

  const detExpHeaders = ['Change', 'Deal Name', 'Business Unit', 'Stage', 'Details'];
  const detExpRows = rows.map(r => {
    const d = r.deal;
    const detail = r.type === 'added'
      ? `MRR ${d.mrr_inr || 0} · NRR ${d.nrr_inr || 0} · ${d.probability}% · ${d.stage || ''}`
      : r.type === 'dropped'
      ? `was: MRR ${d.mrr_inr || 0} · NRR ${d.nrr_inr || 0} · ${d.probability}% · ${d.stage || ''}`
      : r.changes.map(c => `${c.field}: ${c.from} → ${c.to}`).join('; ');
    return [r.type, d.deal_name || d.deal_id, d.business_unit || '', d.stage || '', detail];
  });
  wrap.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <div style="font-size:12px;color:var(--text-muted);">
        Comparing <strong>${fmtTs(prevTime)}</strong> → <strong>${fmtTs(latestTime)}</strong> ·
        <span class="var-pos">${added} added</span> · <span class="var-neg">${dropped} dropped</span> · ${changed} changed
      </div>
      <button class="sync-btn" id="hunt-det-xbtn" style="margin-left:auto;">↓ Export</button>
    </div>
    <div class="table-scroll"><table>
      <thead><tr>
        <th>Change</th>
        <th>Deal Name</th>
        <th>Business Unit</th>
        <th>Stage</th>
        <th>Details</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></div>`;
  document.getElementById('hunt-det-xbtn').onclick = () =>
    downloadXLSX(`Hunting_movement_${currentQuarter}`, detExpHeaders, detExpRows);
}

// ============================================================
// BU DETAIL VIEW
// ============================================================
function renderBUDetailView() {
  const bu = currentBUDetail;
  const PERIOD_TABS = computePeriodTabs(currentQuarter);
  const periodTab = PERIOD_TABS.find(p => p.key === currentPeriodTab) || PERIOD_TABS[PERIOD_TABS.length - 1];
  const dealsById = new Map(DEALS.map(d => [d.deal_id, d]));
  const latestMRR = MRR_DATES[MRR_DATES.length - 1];
  const latestNRR = NRR_DATES[NRR_DATES.length - 1];

  const amountMRR = s => Number(s.mrr_amount);
  const amountNRR = s => Number(s.nrr_amount);

  const buDeals = DEALS.filter(d => (d.business_unit || 'UNMAPPED') === bu);
  const buDealIds = new Set(buDeals.map(d => d.deal_id));

  // Commit = deals in this period with probability >= 70% (or active view filter)
  const minProb = activePipelineView ? activePipelineView.min_probability : 70;
  const committedBUDeals = buDeals.filter(d => {
    if (!snapClosingInPeriod(d.closing_date, periodTab)) return false;
    if ((d.probability ?? 100) < minProb) return false;
    if (activePipelineView?.deal_types?.length && !activePipelineView.deal_types.includes(d.deal_type)) return false;
    if (activePipelineView?.stages?.length && !activePipelineView.stages.includes(d.stage)) return false;
    return true;
  });
  const mrrCommit = committedBUDeals.reduce((a, d) => a + Number(d.mrr_inr), 0);
  const nrrCommit = committedBUDeals.reduce((a, d) => a + Number(d.nrr_inr), 0);
  const mrrTarget = targetFor(bu, periodTab, 'MRR');
  const nrrTarget = targetFor(bu, periodTab, 'NRR');
  const mrrVar = mrrTarget !== undefined ? mrrCommit - mrrTarget : null;
  const nrrVar = nrrTarget !== undefined ? nrrCommit - nrrTarget : null;

  const varCls = v => v === null ? '' : v >= 0 ? 'var-pos' : 'var-neg';
  const fmtVar = v => v === null ? '-' : (v >= 0 ? '+' : '') + fmtINR(v);

  const tile = (label, value, isVar = false) => {
    const cls = isVar ? varCls(value) : '';
    const display = value === undefined || value === null ? '-' : isVar ? fmtVar(value) : fmtINR(value);
    return `<div class="card" style="flex:1;min-width:140px;padding:14px 18px;">
      <p style="font-size:11px;color:var(--text-muted);margin:0 0 6px;">${label}</p>
      <p class="${cls}" style="font-size:18px;font-weight:700;margin:0;">${display}</p>
    </div>`;
  };

  document.getElementById('subtitle').textContent = `${bu} · ${periodTab.label}`;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;">
      <button id="bu-back-btn" style="padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface-1);color:var(--text);font-size:13px;cursor:pointer;">← Summary</button>
      <span style="font-size:16px;font-weight:700;"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${colorVar(bu)};margin-right:8px;vertical-align:middle;"></span>${escapeHtml(bu)}</span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
      ${tile('MRR Commit', mrrCommit)}${tile('MRR Target', mrrTarget)}${tile('MRR Variance', mrrVar, true)}
      ${tile('NRR Commit', nrrCommit)}${tile('NRR Target', nrrTarget)}${tile('NRR Variance', nrrVar, true)}
    </div>
    <div class="card" style="margin-bottom:16px;">
      <p class="summary-section-title">MRR Commit Details</p>
      <div id="bu-mrr-table"></div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <p class="summary-section-title">NRR Commit Details</p>
      <div id="bu-nrr-table"></div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <p class="summary-section-title">Hunting Pipeline</p>
      <div id="bu-hunting-wrap"></div>
    </div>
    <div class="card">
      <p class="summary-section-title">Activity Timeline</p>
      <div id="bu-timeline"></div>
    </div>`;

  document.getElementById('bu-back-btn').addEventListener('click', () => {
    currentViewMode = 'summary';
    render();
  });

  // ── MRR / NRR commit tables ────────────────────────────────
  function renderBUCommitTable(containerId, metric) {
    const snapshots = metric === 'MRR' ? MRR_SNAPSHOTS : NRR_SNAPSHOTS;
    const allDates  = metric === 'MRR' ? MRR_DATES : NRR_DATES;
    const amountOf  = s => Number(metric === 'MRR' ? s.mrr_amount : s.nrr_amount);
    const el = document.getElementById(containerId);

    const allQuarterMonths = PERIOD_TABS.find(t => isFullQuarterTab(t))?.months || periodTab.months;
    let dates, colLabel;
    if (isFullQuarterTab(periodTab)) {
      const byMonth = new Map();
      for (const d of allDates) {
        const m = Number(d.slice(5,7)), y = Number(d.slice(0,4));
        if (y === periodTab.year && allQuarterMonths.includes(m)) byMonth.set(m, d);
      }
      dates = allQuarterMonths.map(m => byMonth.get(m)).filter(Boolean);
      colLabel = d => MONTH_FULL[Number(d.slice(5,7)) - 1];
    } else {
      const curMonth = periodTab.months[0];
      const priorDates = [], priorDateSet = new Set();
      for (const pm of allQuarterMonths.filter(m => m < curMonth)) {
        const last = [...allDates].reverse().find(d => Number(d.slice(5,7)) === pm && Number(d.slice(0,4)) === periodTab.year);
        if (last) { priorDates.push(last); priorDateSet.add(last); }
      }
      const curDates = allDates.filter(d => Number(d.slice(5,7)) === curMonth && Number(d.slice(0,4)) === periodTab.year);
      dates = [...priorDates, ...curDates];
      colLabel = d => priorDateSet.has(d) ? MONTH_FULL[Number(d.slice(5,7)) - 1] : d;
    }
    if (!dates.length) { el.innerHTML = `<p class="muted">No ${metric} snapshots.</p>`; return; }

    const latestDate = dates[dates.length - 1];
    const prevDate   = dates.length >= 2 ? dates[dates.length - 2] : undefined;

    const snapshotsByDeal = new Map();
    for (const s of snapshots) {
      if (!snapshotsByDeal.has(s.deal_id)) snapshotsByDeal.set(s.deal_id, new Map());
      snapshotsByDeal.get(s.deal_id).set(s.snapshot_date, { amount: amountOf(s), closing_date: s.closing_date, probability: s.probability });
    }

    const snapAmt = (byDate, date) => {
      const e = byDate?.get(date);
      if (e === undefined) return undefined;
      if (!snapClosingInPeriod(e.closing_date, periodTab)) return null;
      return e.amount;
    };

    let deals = buDeals
      .filter(d => snapshotsByDeal.has(d.deal_id) &&
        [...snapshotsByDeal.get(d.deal_id).values()].some(e => snapClosingInPeriod(e.closing_date, periodTab)))
      .sort((a, b) => (snapAmt(snapshotsByDeal.get(b.deal_id), latestDate) ?? 0) - (snapAmt(snapshotsByDeal.get(a.deal_id), latestDate) ?? 0));

    if (!deals.length) { el.innerHTML = `<p class="muted">No ${metric} data for this BU in this period.</p>`; return; }

    const dateHeaders = dates.map(d => `<th class="num">${colLabel(d)}</th>`).join('');
    const varHeader   = prevDate ? `<th class="num">Change</th>` : '';
    const rows = deals.map(d => {
      const byDate = snapshotsByDeal.get(d.deal_id);
      const dateCells = dates.map(date => {
        const v = snapAmt(byDate, date);
        const dateIdx = dates.indexOf(date);
        let lastKnownV = undefined;
        for (let k = dateIdx - 1; k >= 0; k--) {
          const kv = snapAmt(byDate, dates[k]);
          if (kv !== undefined && kv !== null) { lastKnownV = kv; break; }
        }
        const prevD = dateIdx > 0 ? dates[dateIdx - 1] : null;
        const prevV = prevD !== null ? (snapAmt(byDate, prevD) ?? 0) : null;
        if (v === undefined || v === null) {
          const cls = lastKnownV === undefined ? '' : lastKnownV > 0 ? 'var-neg' : lastKnownV < 0 ? 'var-pos' : '';
          return `<td class="num ${cls}"><span class="muted">-</span></td>`;
        }
        let cls = '';
        if (prevV !== null) { cls = v > prevV ? 'var-pos' : v < prevV ? 'var-neg' : ''; }
        return `<td class="num ${cls}">${fmtINR(v)}</td>`;
      }).join('');
      let varCell = '';
      if (prevDate) {
        const lv = snapAmt(byDate, latestDate) ?? 0, pv = snapAmt(byDate, prevDate) ?? 0;
        if (snapAmt(byDate, latestDate) === undefined && snapAmt(byDate, prevDate) === undefined) {
          varCell = `<td class="num muted">-</td>`;
        } else {
          const v = lv - pv;
          varCell = `<td class="num ${v > 0 ? 'var-pos' : v < 0 ? 'var-neg' : ''}">${v > 0 ? '+' : ''}${fmtINR(v)}</td>`;
        }
      }
      const link = ZOHO_DEAL_URL(d.deal_id);
      return `<tr>
        <td class="name-cell"><a class="zoho-link" href="${link}" target="_blank" rel="noopener">${nameChainHtml(d)}</a></td>
        <td class="name-cell">${escapeHtml(d.account_name || '')}</td>
        <td>${escapeHtml(d.deal_type || '')}</td>
        ${dateCells}${varCell}
      </tr>`;
    }).join('');

    const totalCells = dates.map(date => {
      let sum = 0, any = false;
      deals.forEach(d => { const v = snapAmt(snapshotsByDeal.get(d.deal_id), date); if (v !== undefined && v !== null) { sum += v; any = true; } });
      return `<td class="num">${any ? fmtINR(sum) : '<span class="muted">-</span>'}</td>`;
    }).join('');
    let totalVarCell = '';
    if (prevDate) {
      const sl = deals.reduce((a, d) => a + (snapAmt(snapshotsByDeal.get(d.deal_id), latestDate) ?? 0), 0);
      const sp = deals.reduce((a, d) => a + (snapAmt(snapshotsByDeal.get(d.deal_id), prevDate)   ?? 0), 0);
      const tv = sl - sp;
      totalVarCell = `<td class="num ${tv > 0 ? 'var-pos' : tv < 0 ? 'var-neg' : ''}">${tv > 0 ? '+' : ''}${fmtINR(tv)}</td>`;
    }

    const buExpHeaders = ['Deal Name', 'Account', 'Type', ...dates.map(d => colLabel(d)), ...(prevDate ? ['Change'] : [])];
    const buExpRows = deals.map(d => {
      const byDate = snapshotsByDeal.get(d.deal_id);
      const dateVals = dates.map(date => { const v = snapAmt(byDate, date); return (v !== undefined && v !== null) ? v : ''; });
      const chg = prevDate ? ((snapAmt(byDate, latestDate) ?? 0) - (snapAmt(byDate, prevDate) ?? 0)) : null;
      return [fullNameChainText(d), d.account_name || '', d.deal_type || '', ...dateVals, ...(prevDate ? [chg] : [])];
    });
    const buXId = `${containerId}-xbtn`;
    el.innerHTML = `<div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
      <button class="sync-btn" id="${buXId}">↓ Export</button>
    </div><div class="table-scroll"><table>
      <thead><tr>
        <th>Deal Name</th><th>Account</th><th>Type</th>
        ${dateHeaders}${varHeader}
      </tr></thead>
      <tbody>
        <tr class="total-row"><td colspan="3">Total (${deals.length} deal${deals.length === 1 ? '' : 's'})</td>${totalCells}${totalVarCell}</tr>
        ${rows}
      </tbody>
    </table></div>`;
    document.getElementById(buXId).onclick = () =>
      downloadXLSX(`${bu}_${metric}_${currentPeriodTab}`, buExpHeaders, buExpRows);
  }

  // ── Hunting pipeline for this BU ──────────────────────────
  function renderBUHuntingSection() {
    const wrap = document.getElementById('bu-hunting-wrap');
    const huntingDeals = (HUNTING_PIPELINE || []).filter(d => d.quarter === currentQuarter && (d.business_unit || 'UNMAPPED') === bu);
    if (!huntingDeals.length) { wrap.innerHTML = `<p class="muted">No hunting pipeline deals for this BU in ${currentQuarter}.</p>`; return; }
    renderHuntingTable(huntingDeals, dealsById, QUARTERS.find(x => x.key === currentQuarter) || QUARTERS[1]);
    // renderHuntingTable writes to #hunting-table-wrap — redirect by creating it inside bu-hunting-wrap
  }

  // ── Activity Timeline ─────────────────────────────────────
  function renderBUTimeline() {
    const el = document.getElementById('bu-timeline');
    const events = [];

    for (const metric of ['MRR', 'NRR']) {
      const snapshots = metric === 'MRR' ? MRR_SNAPSHOTS : NRR_SNAPSHOTS;
      const allDates  = metric === 'MRR' ? MRR_DATES : NRR_DATES;
      const amountOf  = s => Number(metric === 'MRR' ? s.mrr_amount : s.nrr_amount);

      const periodDates = allDates.filter(d => {
        const m = Number(d.slice(5,7)), y = Number(d.slice(0,4));
        return periodTab.months.includes(m) && y === periodTab.year;
      });
      if (periodDates.length < 2) continue;

      // Build deal → date → amount map
      const byDeal = new Map();
      for (const s of snapshots) {
        if (!buDealIds.has(s.deal_id)) continue;
        if (!byDeal.has(s.deal_id)) byDeal.set(s.deal_id, new Map());
        byDeal.get(s.deal_id).set(s.snapshot_date, amountOf(s));
      }

      for (let i = 1; i < periodDates.length; i++) {
        const prev = periodDates[i - 1], curr = periodDates[i];
        for (const [dealId, byDate] of byDeal) {
          const prevV = byDate.get(prev) ?? null;
          const currV = byDate.get(curr) ?? null;
          const deal  = dealsById.get(dealId);
          const name  = deal ? (deal.current_name || dealId) : dealId;

          if (prevV === null && currV !== null && currV > 0) {
            events.push({ date: curr, metric, type: 'enter', name, dealId, value: currV });
          } else if (prevV !== null && prevV > 0 && (currV === null || currV === 0)) {
            events.push({ date: curr, metric, type: 'exit', name, dealId, value: prevV });
          } else if (prevV !== null && currV !== null && currV !== prevV) {
            const delta = currV - prevV;
            events.push({ date: curr, metric, type: delta > 0 ? 'up' : 'down', name, dealId, delta, prevV, currV });
          }
        }
      }
    }

    if (!events.length) { el.innerHTML = `<p class="muted">No changes recorded in this period.</p>`; return; }

    events.sort((a, b) => b.date.localeCompare(a.date));

    const grouped = new Map();
    for (const e of events) {
      if (!grouped.has(e.date)) grouped.set(e.date, []);
      grouped.get(e.date).push(e);
    }

    el.innerHTML = [...grouped.entries()].map(([date, evts]) => {
      const rows = evts.map(e => {
        const link = `<a class="zoho-link" href="${ZOHO_DEAL_URL(e.dealId)}" target="_blank" rel="noopener">${escapeHtml(e.name)}</a>`;
        let badge, desc;
        if (e.type === 'enter') {
          badge = `<span class="var-pos" style="font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;">Added</span>`;
          desc  = `<span class="var-pos" style="font-weight:600;">${fmtINR(e.value)}</span>`;
        } else if (e.type === 'exit') {
          badge = `<span class="var-neg" style="font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;">Removed</span>`;
          desc  = `<span class="var-neg" style="font-weight:600;">${fmtINR(e.value)}</span>`;
        } else {
          const cls = e.type === 'up' ? 'var-pos' : 'var-neg';
          badge = `<span class="${cls}" style="font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;">Changed</span>`;
          desc  = `${fmtINR(e.prevV)} → <span class="${cls}" style="font-weight:600;">${fmtINR(e.currV)}</span> <span class="${cls}" style="font-weight:600;">(${e.delta > 0 ? '+' : ''}${fmtINR(e.delta)})</span>`;
        }
        return `<tr>
          <td style="width:72px;padding:4px 6px 4px 0;">${badge}</td>
          <td class="name-cell">${link}</td>
          <td style="font-size:11px;color:var(--text-muted);padding:0 8px;">${e.metric}</td>
          <td>${desc}</td>
        </tr>`;
      }).join('');
      return `<div style="margin-bottom:16px;">
        <p style="font-size:12px;font-weight:600;color:var(--text-muted);margin:0 0 6px;">${date}</p>
        <table style="width:100%;border-collapse:collapse;">${rows}</table>
      </div>`;
    }).join('');
  }

  renderBUCommitTable('bu-mrr-table', 'MRR');
  renderBUCommitTable('bu-nrr-table', 'NRR');

  // Hunting section needs its own wrap element
  const huntingDeals = (HUNTING_PIPELINE || []).filter(d => d.quarter === currentQuarter && (d.business_unit || 'UNMAPPED') === bu);
  const huntingWrap = document.getElementById('bu-hunting-wrap');
  if (!huntingDeals.length) {
    huntingWrap.innerHTML = `<p class="muted">No hunting pipeline deals for this BU in ${currentQuarter}.</p>`;
  } else {
    huntingWrap.innerHTML = `<div id="hunting-table-wrap"></div>`;
    renderHuntingTable(huntingDeals, dealsById, QUARTERS.find(x => x.key === currentQuarter) || QUARTERS[1]);
  }

  renderBUTimeline();
}

function downloadXLSX(filename, headers, rows) {
  const ex = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cell = v => {
    if (v === null || v === undefined || v === '') return '<Cell><Data ss:Type="String"></Data></Cell>';
    if (typeof v === 'number') return `<Cell><Data ss:Type="Number">${v}</Data></Cell>`;
    return `<Cell><Data ss:Type="String">${ex(String(v))}</Data></Cell>`;
  };
  const xmlRow = cols => `<Row>${cols.map(cell).join('')}</Row>`;
  const xml = `<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Styles><Style ss:ID="n"><NumberFormat ss:Format="#,##0"/></Style></Styles><Worksheet ss:Name="Data"><Table>${xmlRow(headers)}${rows.map(xmlRow).join('')}</Table></Worksheet></Workbook>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([xml], { type: 'application/vnd.ms-excel;charset=utf-8' }));
  a.download = filename.replace(/[/\\:*?"<>|]/g, '_') + '.xls';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

main();
</script>
