<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MRR Dashboard Settings</title>
<style>
  .viz-root {
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --good:           #0ca30c;
    --warning:        #fab219;
    --series-1: #2a78d6;
    --series-6: #e34948;
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --good:           #0ca30c;
      --warning:        #fab219;
      --series-1: #3987e5;
      --series-6: #e66767;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page); color: var(--text-primary); font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color: inherit; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 64px; }
  .topbar { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { color: var(--text-secondary); font-size: 13px; margin: 0 0 20px; }
  .back-link { font-size: 12px; color: var(--text-secondary); text-decoration: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; }
  .back-link:hover { color: var(--text-primary); }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 14px; margin: 0 0 8px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
  .card p.desc { font-size: 13px; color: var(--text-secondary); margin: 0 0 16px; }
  label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  input[type=email], input[type=password], input[type=number] {
    font: inherit; font-size: 14px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface-1); color: var(--text-primary); width: 100%;
  }
  select { font: inherit; font-size: 13px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface-1); color: var(--text-primary); }
  .field { margin-bottom: 14px; max-width: 320px; }
  button {
    font: inherit; font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 6px; border: none;
    background: var(--series-1); color: #fff; cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  button.secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--gridline); }
  th { color: var(--text-secondary); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.02em; }
  td.num input { text-align: right; width: 140px; }
  .split-cell { display: flex; gap: 6px; align-items: center; }
  .split-cell input { width: 90px; }
  .msg { font-size: 13px; margin-top: 10px; }
  .msg.error { color: #d03b3b; }
  .msg.success { color: var(--good); }
  .muted { color: var(--text-muted); font-size: 13px; }
  .who { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>
<div class="viz-root">
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>MRR Dashboard Settings</h1>
        <p class="subtitle">Edit MRR targets and the monthly split used by the dashboard.</p>
      </div>
      <a class="back-link" href="index.html">Back to dashboard</a>
    </div>
    <div id="sync-config"></div>
    <div id="content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qnulyenilttpalbkmpvm.supabase.co';
const SUPABASE_KEY = 'sb_publishable__ZX4BeZvlMqaYi8MWrP2Kg_itCCcMFZ';
const BU_LIST = ['KAM BU', 'MEA BU', 'SEA BU', 'BAT BU', 'India MM BU', 'India ENT BU', 'SME BU'];
const MONTHS = ['July 2026', 'August 2026', 'September 2026'];

let session = null; // { access_token, refresh_token, user }

function loadSession() {
  const raw = sessionStorage.getItem('mrr_settings_session');
  if (raw) session = JSON.parse(raw);
}
function saveSession() {
  if (session) sessionStorage.setItem('mrr_settings_session', JSON.stringify(session));
  else sessionStorage.removeItem('mrr_settings_session');
}

async function login(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const body = await res.json();
  if (!res.ok) throw new Error(body.error_description || body.msg || 'Login failed');
  session = { access_token: body.access_token, refresh_token: body.refresh_token, user: body.user };
  saveSession();
}

function logout() {
  session = null;
  saveSession();
  render();
}

async function authedFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${session.access_token}`,
      'Content-Type': 'application/json',
      ...options.headers,
    },
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Request failed: ${res.status} ${text}`);
  }
  return res.status === 204 ? null : res.json();
}

async function sbRead(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
  });
  if (!res.ok) throw new Error(`Failed to load ${path}`);
  return res.json();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderLogin() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card" style="max-width:360px;">
      <h2>Log in</h2>
      <p class="desc">Settings changes require a Supabase account with access to this project. Ask the project owner for one if you do not have it.</p>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button id="login-btn">Log in</button>
      <div class="msg" id="login-msg"></div>
    </div>
  `;
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('login-msg');
    msg.textContent = '';
    msg.className = 'msg';
    try {
      await login(email, password);
      render();
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg error';
    }
  });
}

async function renderSettings() {
  const content = document.getElementById('content');
  content.innerHTML = `<p class="muted">Loading...</p>`;

  let targets, targetSettings;
  try {
    [targets, targetSettings] = await Promise.all([
      sbRead('bu_targets?select=*'),
      sbRead('target_settings?select=*'),
    ]);
  } catch (err) {
    content.innerHTML = `<div class="card"><p class="msg error">${err.message}</p></div>`;
    return;
  }

  const targetByBU = new Map(targets.map(t => [t.business_unit, t]));
  const settingByKey = new Map(targetSettings.map(s => [`${s.business_unit}::${s.period}`, s]));
  const jasPeriod = targets[0]?.period || 'JAS 2026';

  content.innerHTML = `
    <div class="who">
      <span>Logged in as ${escapeHtml(session.user?.email || '')}</span>
      <button class="secondary" id="logout-btn">Log out</button>
    </div>

    <div class="card">
      <h2>${escapeHtml(jasPeriod)} MRR Targets</h2>
      <p class="desc">The quarter target per business unit. The dashboard's Combined tab shows attainment against these.</p>
      <table>
        <thead><tr><th>Business Unit</th><th class="num">Target (Rupees)</th></tr></thead>
        <tbody>
          ${BU_LIST.map(bu => `<tr>
            <td>${bu}</td>
            <td class="num"><input type="number" step="1" data-bu-target="${bu}" value="${targetByBU.get(bu) ? Number(targetByBU.get(bu).target_amount) : 0}"></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <button id="save-targets-btn">Save JAS Targets</button>
      <div class="msg" id="targets-msg"></div>
    </div>

    <div class="card">
      <h2>Monthly Split</h2>
      <p class="desc">Default is 30% in July, 30% in August, 40% in September of the JAS target. Switch a cell to "absolute" to override with an exact number instead of a percentage.</p>
      <table>
        <thead><tr><th>Business Unit</th>${MONTHS.map(m => `<th>${m.split(' ')[0]}</th>`).join('')}</tr></thead>
        <tbody>
          ${BU_LIST.map(bu => `<tr>
            <td>${bu}</td>
            ${MONTHS.map(period => {
              const s = settingByKey.get(`${bu}::${period}`);
              const mode = s?.mode || 'percent';
              const value = s ? Number(s.value) : (period === 'September 2026' ? 40 : 30);
              return `<td>
                <div class="split-cell">
                  <select data-split-mode="${bu}::${period}">
                    <option value="percent" ${mode === 'percent' ? 'selected' : ''}>%</option>
                    <option value="absolute" ${mode === 'absolute' ? 'selected' : ''}>Rs</option>
                  </select>
                  <input type="number" step="0.01" data-split-value="${bu}::${period}" value="${value}">
                </div>
              </td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
      <button id="save-split-btn">Save Split Settings</button>
      <div class="msg" id="split-msg"></div>
    </div>
  `;

  document.getElementById('logout-btn').addEventListener('click', logout);

  document.getElementById('save-targets-btn').addEventListener('click', async () => {
    const msg = document.getElementById('targets-msg');
    msg.textContent = '';
    msg.className = 'msg';
    const rows = BU_LIST.map(bu => ({
      business_unit: bu,
      period: jasPeriod,
      target_amount: Number(document.querySelector(`[data-bu-target="${bu}"]`).value),
    }));
    try {
      await authedFetch('bu_targets?on_conflict=business_unit', {
        method: 'POST',
        headers: { Prefer: 'resolution=merge-duplicates' },
        body: JSON.stringify(rows),
      });
      msg.textContent = 'Saved.';
      msg.className = 'msg success';
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg error';
    }
  });

  document.getElementById('save-split-btn').addEventListener('click', async () => {
    const msg = document.getElementById('split-msg');
    msg.textContent = '';
    msg.className = 'msg';
    const rows = [];
    for (const bu of BU_LIST) {
      for (const period of MONTHS) {
        const mode = document.querySelector(`[data-split-mode="${bu}::${period}"]`).value;
        const value = Number(document.querySelector(`[data-split-value="${bu}::${period}"]`).value);
        rows.push({ business_unit: bu, period, mode, value });
      }
    }
    try {
      await authedFetch('target_settings?on_conflict=business_unit,period', {
        method: 'POST',
        headers: { Prefer: 'resolution=merge-duplicates' },
        body: JSON.stringify(rows),
      });
      msg.textContent = 'Saved.';
      msg.className = 'msg success';
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg error';
    }
  });
}

function renderSyncConfig() {
  // Sync now runs via Supabase Edge Function -- no PAT needed.
  document.getElementById('sync-config').innerHTML = '';
}

function render() {
  if (session) renderSettings();
  else renderLogin();
}

loadSession();
renderSyncConfig();
render();
</script>
</body>
</html>
