<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AOP Tracker Settings</title>
<style>
  .viz-root {
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --good:           #0ca30c;
    --warning:        #fab219;
    --series-1: #2a78d6;
    --series-6: #e34948;
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --good:           #0ca30c;
      --warning:        #fab219;
      --series-1: #3987e5;
      --series-6: #e66767;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page); color: var(--text-primary); font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color: inherit; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 64px; }
  .topbar { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { color: var(--text-secondary); font-size: 13px; margin: 0 0 20px; }
  .back-link { font-size: 12px; color: var(--text-secondary); text-decoration: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; }
  .back-link:hover { color: var(--text-primary); }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 14px; margin: 0 0 8px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
  .card p.desc { font-size: 13px; color: var(--text-secondary); margin: 0 0 16px; }
  label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  input[type=email], input[type=password], input[type=number] {
    font: inherit; font-size: 14px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface-1); color: var(--text-primary); width: 100%;
  }
  select { font: inherit; font-size: 13px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface-1); color: var(--text-primary); }
  .field { margin-bottom: 14px; max-width: 320px; }
  button {
    font: inherit; font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 6px; border: none;
    background: var(--series-1); color: #fff; cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  button.secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--gridline); }
  th { color: var(--text-secondary); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.02em; }
  td.num input { text-align: right; width: 140px; }
  .split-cell { display: flex; gap: 6px; align-items: center; }
  .split-cell input { width: 90px; }
  .msg { font-size: 13px; margin-top: 10px; }
  .msg.error { color: #d03b3b; }
  .msg.success { color: var(--good); }
  .muted { color: var(--text-muted); font-size: 13px; }
  .who { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .quarter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .quarter-row label { margin: 0; font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
  .quarter-row select { font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
<div class="viz-root">
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>AOP Tracker Settings</h1>
        <p class="subtitle">Manage targets, monthly splits, and BU overrides.</p>
      </div>
      <a class="back-link" href="index.html">Back to dashboard</a>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qnulyenilttpalbkmpvm.supabase.co';
const SUPABASE_KEY = 'sb_publishable__ZX4BeZvlMqaYi8MWrP2Kg_itCCcMFZ';
const BU_LIST = ['KAM BU', 'MEA BU', 'SEA BU', 'BAT BU', 'India MM BU', 'India ENT BU', 'SME BU'];

const QUARTERS = [
  { key: '2026-Q2', label: 'Q2 2026', year: 2026, months: [4,5,6] },
  { key: '2026-Q3', label: 'Q3 2026', year: 2026, months: [7,8,9] },
  { key: '2026-Q4', label: 'Q4 2026', year: 2026, months: [10,11,12] },
  { key: '2027-Q1', label: 'Q1 2027', year: 2027, months: [1,2,3] },
  { key: '2027-Q2', label: 'Q2 2027', year: 2027, months: [4,5,6] },
];
const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getQuarterMonths(qKey) {
  const q = QUARTERS.find(x => x.key === qKey) || QUARTERS[1];
  return q.months.map(m => `${MONTH_FULL[m-1]} ${q.year}`);
}

function quarterLabel(qKey) {
  return (QUARTERS.find(q => q.key === qKey) || QUARTERS[1]).label;
}

let session = null;
let settingsQuarter = '2026-Q3';

function loadSession() {
  const raw = sessionStorage.getItem('mrr_settings_session');
  if (raw) session = JSON.parse(raw);
}
function saveSession() {
  if (session) sessionStorage.setItem('mrr_settings_session', JSON.stringify(session));
  else sessionStorage.removeItem('mrr_settings_session');
}

async function login(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const body = await res.json();
  if (!res.ok) throw new Error(body.error_description || body.msg || 'Login failed');
  session = { access_token: body.access_token, refresh_token: body.refresh_token, user: body.user };
  saveSession();
}

function logout() {
  session = null;
  saveSession();
  render();
}

async function authedFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${session.access_token}`,
      'Content-Type': 'application/json',
      ...options.headers,
    },
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Request failed: ${res.status} ${text}`);
  }
  return res.status === 204 ? null : res.json();
}

async function sbRead(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
  });
  if (!res.ok) throw new Error(`Failed to load ${path}`);
  return res.json();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderLogin() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:360px;">
      <h2>Log in</h2>
      <p class="desc">Settings changes require a Supabase account. Ask the project owner for credentials.</p>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button id="login-btn">Log in</button>
      <div class="msg" id="login-msg"></div>
    </div>
  `;
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('login-msg');
    msg.textContent = '';
    msg.className = 'msg';
    try {
      await login(email, password);
      render();
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg error';
    }
  });
}

async function renderSettings() {
  const content = document.getElementById('content');
  content.innerHTML = `<p class="muted">Loading...</p>`;

  const months = getQuarterMonths(settingsQuarter);

  let mrrTargets, nrrTargets, targetSettings, nrrTargetSettings, allDeals;
  try {
    [mrrTargets, nrrTargets, targetSettings, nrrTargetSettings, allDeals] = await Promise.all([
      sbRead(`bu_targets?select=*&period=eq.${encodeURIComponent(settingsQuarter)}`),
      sbRead(`nrr_targets?select=*&period=eq.${encodeURIComponent(settingsQuarter)}`),
      sbRead('target_settings?select=*'),
      sbRead('nrr_target_settings?select=*'),
      sbRead('deals?select=deal_id,current_name,account_name,business_unit,bu_override&order=current_name.asc'),
    ]);
  } catch (err) {
    content.innerHTML = `<div class="card"><p class="msg error">${escapeHtml(err.message)}</p></div>`;
    return;
  }

  const mrrByBU = new Map(mrrTargets.map(t => [t.business_unit, t]));
  const nrrByBU = new Map(nrrTargets.map(t => [t.business_unit, t]));
  const settingByKey = new Map(targetSettings.map(s => [`${s.business_unit}::${s.period}`, s]));
  const nrrSettingByKey = new Map(nrrTargetSettings.map(s => [`${s.business_unit}::${s.period}`, s]));

  const overrideDeals = allDeals.filter(d =>
    d.bu_override || d.business_unit === 'UNMAPPED' || !d.business_unit
  ).sort((a, b) => {
    if (a.bu_override && !b.bu_override) return -1;
    if (!a.bu_override && b.bu_override) return 1;
    return (a.current_name || '').localeCompare(b.current_name || '');
  });

  const qLabel = quarterLabel(settingsQuarter);

  content.innerHTML = `
    <div class="who">
      <span>Logged in as ${escapeHtml(session.user?.email || '')}</span>
      <button class="secondary" id="logout-btn">Log out</button>
    </div>

    <div class="quarter-row">
      <label>Quarter:</label>
      <select id="quarter-sel">
        ${QUARTERS.map(q => `<option value="${q.key}" ${q.key === settingsQuarter ? 'selected' : ''}>${q.label}</option>`).join('')}
      </select>
    </div>

    <div class="card">
      <h2>BU Override</h2>
      <p class="desc">Deals showing as UNMAPPED where Zoho has two BUs mapped. Overrides are preserved across syncs. Set back to "Auto" to let sync decide again.</p>
      ${overrideDeals.length === 0
        ? `<p class="muted">No UNMAPPED deals. All deals have a BU assigned.</p>`
        : `<table>
          <thead><tr><th>Deal</th><th>Account</th><th>Current BU</th><th>Override</th></tr></thead>
          <tbody>
            ${overrideDeals.map(d => `<tr>
              <td style="font-size:12px;max-width:220px;word-break:break-word">${escapeHtml(d.current_name || '')}</td>
              <td style="font-size:12px;color:var(--text-secondary)">${escapeHtml(d.account_name || '')}</td>
              <td style="font-size:12px;color:var(--text-muted)">${escapeHtml(d.bu_override || d.business_unit || 'UNMAPPED')}</td>
              <td>
                <select data-override-id="${escapeHtml(d.deal_id)}">
                  ${BU_LIST.map(bu => `<option value="${bu}" ${d.bu_override === bu ? 'selected' : ''}>${bu}</option>`).join('')}
                  <option value="" ${!d.bu_override ? 'selected' : ''}>-- Auto (from sync) --</option>
                </select>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
        <button id="save-overrides-btn">Save BU Overrides</button>
        <div class="msg" id="overrides-msg"></div>`
      }
    </div>

    <div class="card">
      <h2>MRR Targets - ${escapeHtml(qLabel)}</h2>
      <p class="desc">Quarter MRR target per business unit. The dashboard shows attainment against this.</p>
      <table>
        <thead><tr><th>Business Unit</th><th class="num">Target (Rs)</th></tr></thead>
        <tbody>
          ${BU_LIST.map(bu => `<tr>
            <td>${escapeHtml(bu)}</td>
            <td class="num"><input type="number" step="1" data-mrr-target="${escapeHtml(bu)}" value="${mrrByBU.has(bu) ? Number(mrrByBU.get(bu).target_amount) : 0}"></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <button id="save-mrr-btn">Save MRR Targets</button>
      <div class="msg" id="mrr-msg"></div>
    </div>

    <div class="card">
      <h2>NRR Targets - ${escapeHtml(qLabel)}</h2>
      <p class="desc">Quarter NRR target per business unit. Shown on the NRR view in the dashboard.</p>
      <table>
        <thead><tr><th>Business Unit</th><th class="num">Target (Rs)</th></tr></thead>
        <tbody>
          ${BU_LIST.map(bu => `<tr>
            <td>${escapeHtml(bu)}</td>
            <td class="num"><input type="number" step="1" data-nrr-target="${escapeHtml(bu)}" value="${nrrByBU.has(bu) ? Number(nrrByBU.get(bu).target_amount) : 0}"></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <button id="save-nrr-btn">Save NRR Targets</button>
      <div class="msg" id="nrr-msg"></div>
    </div>

    <div class="card">
      <h2>Monthly MRR Split - ${escapeHtml(qLabel)}</h2>
      <p class="desc">How the quarterly MRR target is split across months. Default is equal (33.33% each). Switch to "Rs" to enter an exact absolute value instead.</p>
      <table>
        <thead><tr><th>Business Unit</th>${months.map(m => `<th>${escapeHtml(m.split(' ')[0])}</th>`).join('')}</tr></thead>
        <tbody>
          ${BU_LIST.map(bu => `<tr>
            <td>${escapeHtml(bu)}</td>
            ${months.map(period => {
              const s = settingByKey.get(`${bu}::${period}`);
              const mode  = s ? s.mode  : 'percent';
              const value = s ? Number(s.value) : (100 / 3).toFixed(2);
              return `<td>
                <div class="split-cell">
                  <select data-split-mode="${escapeHtml(bu)}::${escapeHtml(period)}">
                    <option value="percent" ${mode === 'percent' ? 'selected' : ''}>%</option>
                    <option value="absolute" ${mode === 'absolute' ? 'selected' : ''}>Rs</option>
                  </select>
                  <input type="number" step="0.01" data-split-value="${escapeHtml(bu)}::${escapeHtml(period)}" value="${value}">
                </div>
              </td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
      <button id="save-split-btn">Save Monthly Split</button>
      <div class="msg" id="split-msg"></div>
    </div>

    <div class="card">
      <h2>Monthly NRR Split - ${escapeHtml(qLabel)}</h2>
      <p class="desc">How the quarterly NRR target is split across months. Default is equal (33.33% each). Switch to "Rs" to enter an exact absolute value.</p>
      <table>
        <thead><tr><th>Business Unit</th>${months.map(m => `<th>${escapeHtml(m.split(' ')[0])}</th>`).join('')}</tr></thead>
        <tbody>
          ${BU_LIST.map(bu => `<tr>
            <td>${escapeHtml(bu)}</td>
            ${months.map(period => {
              const s = nrrSettingByKey.get(`${bu}::${period}`);
              const mode  = s ? s.mode  : 'percent';
              const value = s ? Number(s.value) : (100 / 3).toFixed(2);
              return `<td>
                <div class="split-cell">
                  <select data-nrr-split-mode="${escapeHtml(bu)}::${escapeHtml(period)}">
                    <option value="percent" ${mode === 'percent' ? 'selected' : ''}>%</option>
                    <option value="absolute" ${mode === 'absolute' ? 'selected' : ''}>Rs</option>
                  </select>
                  <input type="number" step="0.01" data-nrr-split-value="${escapeHtml(bu)}::${escapeHtml(period)}" value="${value}">
                </div>
              </td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
      <button id="save-nrr-split-btn">Save NRR Monthly Split</button>
      <div class="msg" id="nrr-split-msg"></div>
    </div>
  `;

  // Quarter selector
  document.getElementById('quarter-sel').addEventListener('change', async e => {
    settingsQuarter = e.target.value;
    await renderSettings();
  });

  document.getElementById('logout-btn').addEventListener('click', logout);

  // BU Override save
  if (overrideDeals.length > 0) {
    document.getElementById('save-overrides-btn').addEventListener('click', async () => {
      const msg = document.getElementById('overrides-msg');
      msg.textContent = '';
      msg.className = 'msg';
      try {
        const selects = document.querySelectorAll('[data-override-id]');
        for (const sel of selects) {
          const dealId = sel.getAttribute('data-override-id');
          await authedFetch(`deals?deal_id=eq.${encodeURIComponent(dealId)}`, {
            method: 'PATCH',
            body: JSON.stringify({ bu_override: sel.value || null }),
          });
        }
        msg.textContent = 'Saved. Run a sync to apply overrides to the dashboard.';
        msg.className = 'msg success';
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'msg error';
      }
    });
  }

  // MRR targets save
  document.getElementById('save-mrr-btn').addEventListener('click', async () => {
    const msg = document.getElementById('mrr-msg');
    msg.textContent = '';
    msg.className = 'msg';
    const rows = BU_LIST.map(bu => ({
      business_unit: bu,
      period: settingsQuarter,
      target_amount: Number(document.querySelector(`[data-mrr-target="${bu}"]`).value),
    }));
    try {
      await authedFetch('bu_targets?on_conflict=business_unit,period', {
        method: 'POST',
        headers: { Prefer: 'resolution=merge-duplicates' },
        body: JSON.stringify(rows),
      });
      msg.textContent = 'Saved.';
      msg.className = 'msg success';
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg error';
    }
  });

  // NRR targets save
  document.getElementById('save-nrr-btn').addEventListener('click', async () => {
    const msg = document.getElementById('nrr-msg');
    msg.textContent = '';
    msg.className = 'msg';
    const rows = BU_LIST.map(bu => ({
      business_unit: bu,
      period: settingsQuarter,
      target_amount: Number(document.querySelector(`[data-nrr-target="${bu}"]`).value),
    }));
    try {
      await authedFetch('nrr_targets?on_conflict=business_unit,period', {
        method: 'POST',
        headers: { Prefer: 'resolution=merge-duplicates' },
        body: JSON.stringify(rows),
      });
      msg.textContent = 'Saved.';
      msg.className = 'msg success';
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg error';
    }
  });

  // Monthly MRR split save
  document.getElementById('save-split-btn').addEventListener('click', async () => {
    const msg = document.getElementById('split-msg');
    msg.textContent = '';
    msg.className = 'msg';
    const currentMonths = getQuarterMonths(settingsQuarter);
    const rows = [];
    for (const bu of BU_LIST) {
      for (const period of currentMonths) {
        rows.push({
          business_unit: bu,
          period,
          mode:  document.querySelector(`[data-split-mode="${bu}::${period}"]`).value,
          value: Number(document.querySelector(`[data-split-value="${bu}::${period}"]`).value),
        });
      }
    }
    try {
      await authedFetch('target_settings?on_conflict=business_unit,period', {
        method: 'POST',
        headers: { Prefer: 'resolution=merge-duplicates' },
        body: JSON.stringify(rows),
      });
      msg.textContent = 'Saved.';
      msg.className = 'msg success';
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg error';
    }
  });

  // Monthly NRR split save
  document.getElementById('save-nrr-split-btn').addEventListener('click', async () => {
    const msg = document.getElementById('nrr-split-msg');
    msg.textContent = '';
    msg.className = 'msg';
    const currentMonths = getQuarterMonths(settingsQuarter);
    const rows = [];
    for (const bu of BU_LIST) {
      for (const period of currentMonths) {
        rows.push({
          business_unit: bu,
          period,
          mode:  document.querySelector(`[data-nrr-split-mode="${bu}::${period}"]`).value,
          value: Number(document.querySelector(`[data-nrr-split-value="${bu}::${period}"]`).value),
        });
      }
    }
    try {
      await authedFetch('nrr_target_settings?on_conflict=business_unit,period', {
        method: 'POST',
        headers: { Prefer: 'resolution=merge-duplicates' },
        body: JSON.stringify(rows),
      });
      msg.textContent = 'Saved.';
      msg.className = 'msg success';
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'msg error';
    }
  });
}

function render() {
  if (session) renderSettings();
  else renderLogin();
}

loadSession();
render();
</script>
</body>
</html>
